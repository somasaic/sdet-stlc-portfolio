name: Playwright CLI — UI + API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        working-directory: Playwright_CLI
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Playwright_CLI
        run: npx playwright install --with-deps

      - name: Run API tests (fast — no browser required)
        working-directory: Playwright_CLI
        run: npx playwright test --project=api

      - name: Run UI tests
        working-directory: Playwright_CLI
        run: npx playwright test --project=ui

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-cli-report
          path: Playwright_CLI/playwright-report/
          retention-days: 30
