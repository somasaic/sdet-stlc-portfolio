name: Playwright AI Agents Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      working-directory: Playwright_AI_Agents
      run: npm ci

    - name: Install Playwright browsers
      working-directory: Playwright_AI_Agents
      run: npx playwright install --with-deps chromium

    - name: Run visual regression tests
      working-directory: Playwright_AI_Agents
      run: npx playwright test tests/visual/ --project=chromium --reporter=list

    - name: Run agent-generated tests
      working-directory: Playwright_AI_Agents
      run: npx playwright test tests/login/ --project=chromium --reporter=list
      continue-on-error: true

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-agents-report
        path: Playwright_AI_Agents/playwright-report/
        retention-days: 30

    - name: Upload baseline screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: visual-baselines
        path: Playwright_AI_Agents/tests/visual/
        retention-days: 30