name: Playwright Tests — VWO Login STLC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright_AI_Agents dependencies
        working-directory: Playwright_AI_Agents
        run: npm install

      - name: Install Playwright_CLI dependencies
        working-directory: Playwright_CLI
        run: npm install

      - name: Install STLC_Standard_CLI dependencies
        working-directory: STLC_Standard_CLI
        run: npm install

      - name: Install STLC_MCP_Project dependencies
        working-directory: STLC_MCP_Project
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run all Playwright tests
        run: npm test
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
